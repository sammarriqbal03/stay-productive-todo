<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f766e">
    <meta name="Description" content="Stay Productive - A modern To-Do List WebApp.">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.12.0-2/css/all.min.css" crossorigin="anonymous" />

    <link rel="shortcut icon" type="image/png" href="assets/favicon.png"/>
    <link rel="stylesheet" href="CSS/main.css">
    <link rel="stylesheet" href="CSS/corner.css">
    <title>Stay Productive</title>
</head>
<body>
    <div id="header">
        <div class="flexrow-container">
            <div class="ocean-theme theme-selector" title="Ocean"></div>
            <div class="sunset-theme theme-selector" title="Sunset"></div>
            <div class="forest-theme theme-selector" title="Forest"></div>
        </div>
        <h1 id="title">Stay Productive ✨<div id="border"></div></h1>
    </div>

    <div id="form">
        <form>
            <input class="todo-input" type="text" placeholder="What's your next task?">
            <button class="todo-btn" type="submit"><i class="fas fa-plus"></i> Add Task</button>
        </form>
    </div>

    <div class="version">
        <a href="https://github.com/sammarriqbal03" target="_blank" rel="noopener noreferrer" class="github-corner" aria-label="View GitHub Profile">
            <svg width="80" height="80" viewBox="0 0 250 250" style="fill:#151513; color:#fff; position: absolute; top: 0; border: 0; left: 0; transform: scale(-1, 1);">
                <path d="M0,0 L115,115 L130,115 L142,142 L250,250 L250,0 Z"></path>
                <path d="M128.3,109.0 C113.8,99.7 119.0,89.6 119.0,89.6 C122.0,82.7 120.5,78.6 120.5,78.6 C119.2,72.0 123.4,76.3 123.4,76.3 C127.3,80.9 125.5,87.3 125.5,87.3 C122.9,97.6 130.6,101.9 134.4,103.2" fill="currentColor" style="transform-origin: 130px 106px;" class="octo-arm"></path>
                <path d="M115.0,115.0 C114.9,115.1 118.7,116.5 119.8,115.4 L133.7,101.6 C136.9,99.2 139.9,98.4 142.2,98.6 C133.8,89.0 127.5,79.8 144.3,62.0 C149.2,56.8 162.4,57.5 171.9,67.7 C173.7,66.7 178.2,63.7 186.0,62.7 C188.6,62.4 188.0,65.4 187.5,65.7 C181.7,69.8 180.0,71.6 178.7,73.6 C178.6,73.8 197.0,89.8 183.5,114.0 C175.0,129.1 156.7,128.1 145.7,127.4 C145.6,127.4 142.0,131.0 139.0,134.0 C141.0,138.0 138.0,141.0 137.0,142.0 C134.0,145.0 130.0,144.0 128.0,142.0 L115.0,128.0" fill="currentColor" class="octo-body"></path>
            </svg>
        </a>
    </div>

    <div id="myUnOrderedList">
        <ul class="todo-list"></ul>
    </div>

    <div id="datetime"></div>

    <script src="JS/main.js"></script>
    <script src="JS/time.js"></script>
</body>
</html>
